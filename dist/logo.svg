<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3A8" />
      <stop offset="50%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    <linearGradient id="darkGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B" />
      <stop offset="100%" stop-color="#553C00" />
    </linearGradient>
  </defs>
  <!-- Outer glowing circle -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-dasharray="2 2" opacity="0.8" />
  <!-- Inner Shield -->
  <path d="M50,15 L78,25 L72,65 L50,85 L28,65 L22,25 Z" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linejoin="round" />
  <!-- Star symbol in background -->
  <polygon points="50,22 53,32 63,32 55,38 58,48 50,42 42,48 45,38 37,32 47,32" fill="url(#gold)" opacity="0.9" />
  <!-- Letters G R K stylized -->
  <text x="50" y="68" font-family="'Montserrat', 'Arial Black', sans-serif" font-weight="900" font-size="20" fill="url(#gold)" text-anchor="middle" letter-spacing="1">GRK</text>
  <!-- Small details -->
  <circle cx="50" cy="75" r="1.5" fill="#FFD700" />
</svg>
